<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Ensure mobile views map 1:1, disable user zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Controller - Retro Velocity</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="grid-overlay"></div>
    <h1>SETUP YOUR RIG</h1>
    
    <div class="input-group">
      <label for="room-code-input">ROOM CODE</label>
      <input type="text" id="room-code-input" maxlength="4" placeholder="----" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    </div>

    <button id="join-btn" class="btn btn-pink">START ENGINE</button>
    <div id="error-msg"></div>
  </div>

  <!-- GAMEPAD SCREEN -->
  <div id="gamepad-screen" class="screen">
    <div class="status-bar">
      <div class="color-indicator" id="player-color-box"></div>
      <div id="connection-status">CONNECTED</div>
    </div>
    
    <div class="instruction">
      <p>TILT L/R TO STEER</p>
      <p>HOLD ANYWHERE FOR GAS</p>
    </div>

    <!-- The whole screen is a gas pedal basically, but we'll put a visual indicator -->
    <div class="gas-indicator" id="gas-indicator">
      <div class="pedal-icon">GAS</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
