<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Ensure mobile views map 1:1, disable user zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Controller - Retro Velocity</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PORTRAIT WARNING -->
  <div id="portrait-lock" class="portrait-lock">
    <div class="rotate-icon">↺</div>
    <h1>ROTATE DEVICE</h1>
    <p>Please hold your phone horizontally like a steering wheel.</p>
  </div>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="grid-overlay"></div>
    <h1>SETUP YOUR RIG</h1>
    
    <div class="input-group">
      <label for="room-code-input">ROOM CODE</label>
      <input type="text" id="room-code-input" maxlength="4" placeholder="----" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    </div>

    <button id="join-btn" class="btn btn-pink">START ENGINE</button>
    <div id="error-msg"></div>
  </div>

  <!-- VIP SCREEN -->
  <div id="vip-screen" class="screen">
    <div class="grid-overlay"></div>
    <h1>VIP SETTINGS</h1>
    <div class="input-group">
      <label>SELECT TRACK</label>
      <select id="track-select">
        <option value="neon_ring">NEON RING</option>
        <option value="cyber_square">CYBER SQUARE</option>
      </select>
    </div>
    <div class="input-group">
      <label>TOTAL RACERS</label>
      <select id="racer-select">
        <option value="2">2 RACERS</option>
        <option value="3">3 RACERS</option>
        <option value="4">4 RACERS</option>
        <option value="5">5 RACERS</option>
        <option value="8">8 RACERS</option>
      </select>
    </div>
    <button id="confirm-btn" class="btn btn-pink">CONFIRM RULES</button>
  </div>

  <!-- WAIT SCREEN -->
  <div id="wait-screen" class="screen">
    <div class="grid-overlay"></div>
    <h2>WAITING...</h2>
    <p style="color: #aaa; text-align: center; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; line-height: 1.5; margin-top: 20px;">The VIP is configuring the race.</p>
  </div>

  <!-- GAMEPAD SCREEN -->
  <div id="gamepad-screen" class="screen">
    <div class="status-bar">
      <div class="color-indicator" id="player-color-box"></div>
      <div id="connection-status">CONNECTED</div>
    </div>
    
    <div class="instruction">
      <p>TILT L/R TO STEER</p>
      <p>HOLD ANYWHERE FOR GAS</p>
    </div>

    <!-- COCKPIT UI -->
    <div class="cockpit">
      <div class="pedal brake-pedal" id="brake-pedal">
        <span class="pedal-label">BRAKE/REV</span>
      </div>
      
      <div class="steering-column">
        <svg id="steering-wheel" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Wheel Grips -->
          <path d="M 15 30 A 45 45 0 0 0 15 70" fill="none" stroke="var(--neon-blue)" stroke-width="12" stroke-linecap="round"/>
          <path d="M 85 30 A 45 45 0 0 1 85 70" fill="none" stroke="var(--neon-blue)" stroke-width="12" stroke-linecap="round"/>
          <!-- Metal Crossbar -->
          <rect x="15" y="42" width="70" height="16" fill="var(--neon-blue)" rx="2"/>
          <!-- Center Hub -->
          <circle cx="50" cy="50" r="16" fill="#000" stroke="var(--neon-pink)" stroke-width="4"/>
          <!-- ED-XI logo inside hub -->
          <text x="50" y="52" fill="white" font-family="'Press Start 2P', cursive" font-size="6" text-anchor="middle" dominant-baseline="middle">XI</text>
        </svg>
      </div>

      <div class="pedal gas-pedal" id="gas-pedal">
        <span class="pedal-label">GAS</span>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
